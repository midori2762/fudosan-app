<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #aaa;
  display: flex;
  justify-content: center;
}

.app {
  width: 390px;
  height: 844px;
  position: relative;
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') center/cover no-repeat;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(10,35,25,0.72);
}

/* ヘッダー */
.header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #fff;
  background: rgba(255,255,255,0.06);
  font-size: 15px;
}

/* 中央 */
.center {
  position: absolute;
  top: 140px;
  width: 100%;
  text-align: center;
  color: #fff;
  padding: 0 28px;
}

.brand {
  font-size: 13px;
  margin-bottom: 8px;
}

.brand span {
  color: #3aa37a;
}

.title {
  font-size: 31px;
  font-weight: 700;
  line-height: 1.45;
}

.title span {
  color: #3aa37a;
}

.sub {
  font-size: 12.5px;
  color: #cfcfcf;
  margin-top: 12px;
  line-height: 1.7;
}

/* ボタン */
.buttons {
  position: absolute;
  bottom: 120px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}

.btn {
  width: 82%;
  height: 92px;
  border-radius: 18px;
  background: rgba(25,85,55,0.92);
  color: #fff;
  font-size: 19px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
</style>
</head>

<body>
<div class="app">

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="header">
    <div>お部屋相談</div>
    <div>⚙</div>
  </div>

  <div class="center">
    <div class="brand">by 不動産 <span>みどり</span></div>

    <div class="title">
      理想の<span>お部屋</span>を<br>
      見つけましょう
    </div>

    <div class="sub">
      AIがご希望をお聞きして、<br>
      最適な物件をご提案します。
    </div>
  </div>

  <div class="buttons">
    <div class="btn">ご来店のお客様</div>
    <div class="btn">ご自宅などでご利用の方</div>
  </div>

</div>
</body>
</html>
