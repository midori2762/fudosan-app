<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お部屋相談</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Noto Sans JP', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ccc;
}

.app {
  width: 390px;
  height: 844px;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
}

/* 背景 */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') center/cover no-repeat;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(15,47,35,0.65);
}

/* ヘッダー */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  color: #fff;
}

.gear {
  font-size: 20px;
}

/* 中央 */
.content {
  position: absolute;
  top: 120px;
  width: 100%;
  text-align: center;
  padding: 0 24px;
  color: #fff;
}

.brand {
  font-size: 14px;
  margin-bottom: 10px;
}

.brand span {
  color: #2e7d5b;
}

.title {
  font-size: 30px;
  font-weight: 700;
  line-height: 1.4;
}

.title span {
  color: #2e7d5b;
}

.sub {
  font-size: 13px;
  color: #d0d0d0;
  margin-top: 10px;
  line-height: 1.6;
}

/* ボタン */
.buttons {
  position: absolute;
  bottom: 140px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.btn {
  width: 80%;
  height: 90px;
  background: rgba(31,95,58,0.9);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 20px;
  font-weight: 600;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
</style>
</head>

<body>
<div class="app">

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="header">
    <div>お部屋相談</div>
    <div class="gear">⚙</div>
  </div>

  <div class="content">
    <div class="brand">by 不動産 <span>みどり</span></div>

    <div class="title">
      理想の<span>お部屋</span>を<br>見つけましょう
    </div>

    <div class="sub">
      AIがご希望をお聞きして、<br>
      最適な物件をご提案します。
    </div>
  </div>

  <div class="buttons">
    <div class="btn">ご来店のお客様</div>
    <div class="btn">ご自宅などでご利用の方</div>
  </div>

</div>
</body>
</html>
